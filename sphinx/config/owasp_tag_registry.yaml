# OWASP LLM Top 10 v2025 — Sphinx Module Tag Registry
# Sprint 36 / SP-360
#
# Maps each Sphinx module (v2.0 base + Roadmap v1 E15–E17) to the OWASP LLM
# Top 10 v2025 categories it addresses.
#
# Categories:
#   LLM01  Prompt Injection
#   LLM02  Sensitive Information Disclosure
#   LLM03  Supply Chain Vulnerabilities
#   LLM04  Data and Model Poisoning
#   LLM05  Improper Output Handling
#   LLM06  Excessive Agency
#   LLM07  System Prompt Leakage
#   LLM08  Vector and Embedding Weaknesses
#   LLM09  Misinformation
#   LLM10  Unbounded Consumption

owasp_version: "2025"
registry_version: "1.0.0"
last_updated: "2026-04-16"

categories:
  LLM01:
    name: "Prompt Injection"
    description: "Direct and indirect prompt injection attacks targeting LLM inputs"
  LLM02:
    name: "Sensitive Information Disclosure"
    description: "Unintended exposure of sensitive data through LLM responses"
  LLM03:
    name: "Supply Chain Vulnerabilities"
    description: "Risks from third-party components, models, and data sources"
  LLM04:
    name: "Data and Model Poisoning"
    description: "Manipulation of training data or model weights"
  LLM05:
    name: "Improper Output Handling"
    description: "Failure to validate or sanitize LLM-generated outputs"
  LLM06:
    name: "Excessive Agency"
    description: "Granting LLMs too much autonomy or access"
  LLM07:
    name: "System Prompt Leakage"
    description: "Unintended disclosure of system prompts via model outputs"
  LLM08:
    name: "Vector and Embedding Weaknesses"
    description: "Vulnerabilities in RAG pipelines, embeddings, and vector stores"
  LLM09:
    name: "Misinformation"
    description: "Generation of false or misleading content by LLMs"
  LLM10:
    name: "Unbounded Consumption"
    description: "Excessive resource usage from uncontrolled LLM operations"

modules:
  # ── Sphinx v2.0 Base Modules (Sprints 1–30) ──────────────────────────

  threat_detection:
    name: "ThreatDetect Engine"
    version: "v2.0"
    description: "Tier 1 pattern-based + Tier 2 ML semantic threat detection"
    owasp_tags: [LLM01, LLM05]
    config_key: "threat_detection_enabled"
    default_enabled: true

  data_shield:
    name: "DataShield PII/PHI Engine"
    version: "v2.0"
    description: "PII/PHI/credential detection and redaction"
    owasp_tags: [LLM02]
    config_key: "data_shield_enabled"
    default_enabled: true

  output_scanner:
    name: "Output Scanner"
    version: "v2.0"
    description: "Response scanning for sensitive content, code injection, and policy violations"
    owasp_tags: [LLM02, LLM05]
    config_key: "output_scanner_enabled"
    default_enabled: true

  rag_pipeline:
    name: "RAG Query Firewall"
    version: "v2.0"
    description: "Query classification and intent filtering for RAG pipelines"
    owasp_tags: [LLM01, LLM08]
    config_key: "rag_firewall_enabled"
    default_enabled: true

  vectordb_proxy:
    name: "VectorDB Security Proxy"
    version: "v2.0"
    description: "Namespace isolation, chunk scanning, and access control for vector databases"
    owasp_tags: [LLM04, LLM08]
    config_key: "vectordb_proxy_enabled"
    default_enabled: true

  mcp_guardrails:
    name: "MCP Tool Call Guardrails"
    version: "v2.0"
    description: "Agent scope enforcement, tool call audit, and risk scoring for MCP servers"
    owasp_tags: [LLM06]
    config_key: "mcp_guardrails_enabled"
    default_enabled: true

  agent_scope:
    name: "Agent Scope Enforcement"
    version: "v2.0"
    description: "Permission boundaries and scope limits for autonomous agents"
    owasp_tags: [LLM06]
    config_key: "agent_scope_enabled"
    default_enabled: true

  memory_firewall:
    name: "Memory Firewall"
    version: "v2.0"
    description: "Memory store isolation, integrity verification, and instruction scanning"
    owasp_tags: [LLM01, LLM04]
    config_key: "memory_firewall_enabled"
    default_enabled: true

  session_security:
    name: "Session Security"
    version: "v2.0"
    description: "Cross-turn risk accumulation and session context isolation"
    owasp_tags: [LLM01, LLM06]
    config_key: "session_security_enabled"
    default_enabled: true

  rate_limiter:
    name: "Rate Limiter"
    version: "v2.0"
    description: "Per-tenant rate limiting and token budget enforcement"
    owasp_tags: [LLM10]
    config_key: "rate_limiter_enabled"
    default_enabled: true

  token_budget:
    name: "Token Budget Manager"
    version: "v2.0"
    description: "Per-request and per-session token consumption limits"
    owasp_tags: [LLM10]
    config_key: "token_budget_enabled"
    default_enabled: true

  cost_tracker:
    name: "Cost Tracker"
    version: "v2.0"
    description: "Provider-level cost tracking and budget alerts"
    owasp_tags: [LLM10]
    config_key: "cost_tracker_enabled"
