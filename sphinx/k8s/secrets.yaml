# Production secrets — use with Vault Agent Injector or External Secrets Operator.
# This template shows the expected secret keys; actual values are injected at deploy time.
#
# For HashiCorp Vault integration, annotate the deployment pod template:
#   vault.hashicorp.com/agent-inject: "true"
#   vault.hashicorp.com/role: "sphinx-gateway"
#   vault.hashicorp.com/agent-inject-secret-db: "secret/data/sphinx/database"
#   vault.hashicorp.com/agent-inject-secret-redis: "secret/data/sphinx/redis"
#   vault.hashicorp.com/agent-inject-secret-encryption: "secret/data/sphinx/encryption"

apiVersion: v1
kind: Secret
metadata:
  name: sphinx-secrets
  namespace: sphinx
  labels:
    app.kubernetes.io/name: sphinx-gateway
type: Opaque
stringData:
  # Replace with actual values or use External Secrets Operator / Vault
  database-url: "postgresql+asyncpg://sphinx:CHANGE_ME@postgres.sphinx.svc.cluster.local:5432/sphinx"
  redis-url: "redis://redis.sphinx.svc.cluster.local:6379/0"
  credential-encryption-key: "CHANGE_ME_GENERATE_WITH_FERNET"
---
# Vault integration — ServiceAccount and auth binding
# Uncomment when using HashiCorp Vault for secrets management
