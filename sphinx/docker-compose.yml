version: "3.9"

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://sphinx:sphinx_secret@postgres:5432/sphinx
      REDIS_URL: redis://redis:6379/0
      DEFAULT_PROVIDER_URL: http://mock-llm:9000
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-llm:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sphinx
      POSTGRES_PASSWORD: sphinx_secret
      POSTGRES_DB: sphinx
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sphinx"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mock-llm:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "mock_llm.server:app", "--host", "0.0.0.0", "--port", "9000"]
    ports:
      - "9000:9000"

volumes:
  pgdata:
